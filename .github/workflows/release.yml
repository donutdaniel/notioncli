name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: notioncli
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: notioncli
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: notioncli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: notioncli.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C linker=clang -C link-arg=-fuse-ld=mold' || '' }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="notioncli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "dist/$archive" "${{ matrix.binary_name }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archive = "notioncli-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" -DestinationPath "dist/$archive"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notioncli-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          SHA_ARM=$(sha256sum "dist/notioncli-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_X86_MAC=$(sha256sum "dist/notioncli-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum "dist/notioncli-${TAG}-x86_64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/donutdaniel/homebrew-tap.git"
          cd homebrew-tap

          cat > Formula/notioncli.rb << FORMULA
          class Notioncli < Formula
            desc "A CLI for the Notion API"
            homepage "https://github.com/donutdaniel/notioncli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/donutdaniel/notioncli/releases/download/${TAG}/notioncli-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "https://github.com/donutdaniel/notioncli/releases/download/${TAG}/notioncli-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/donutdaniel/notioncli/releases/download/${TAG}/notioncli-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "notioncli"
            end

            test do
              assert_match "notioncli", shell_output("#{bin}/notioncli --version")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/notioncli.rb
          git commit -m "Update notioncli to ${VERSION}"
          git push
